name: Build Device GBL EFI

on:
  workflow_dispatch:
    inputs:
      ABL_URL:
        description: Optional direct URL to stock abl.img. Leave empty to use encrypted device_blobs/abl_b.7z
        required: false
      ARTIFACT_NAME:
        description: Artifact name
        default: redmagic-11-pro-gbl-efi
        required: true

permissions:
  contents: read

jobs:
  build-device-efi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make ninja-build lld clang llvm gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu uuid-dev liblzma-dev libssl-dev nasm acpica-tools bc bison flex mingw-w64 zip curl p7zip-full

      - name: Normalize EDK2 executable permissions
        run: |
          chmod +x submodules/uefi/edk2/edksetup.sh
          find submodules/uefi/edk2/BaseTools/BinWrappers/PosixLike -type f -exec chmod +x {} +

      - name: Build Linux toolkit
        run: |
          make target_toolkit_linux

      - name: Patch stock ABL into GBL EFI
        run: |
          set -euo pipefail
          TOOLKIT="targets/toolkit_linux/build/toolkit"
          mkdir -p "$TOOLKIT/images"
          if [ -n "${{ github.event.inputs.ABL_URL }}" ]; then
            curl -L --fail --retry 3 \
              "${{ github.event.inputs.ABL_URL }}" \
              -o "$TOOLKIT/images/abl.img"
          else
            TMP_ABL="$(mktemp -d)"
            7z x "$GITHUB_WORKSPACE/device_blobs/abl_b.7z" \
              -p"${{ secrets.ABL_BLOB_PASSWORD }}" \
              -o"$TMP_ABL"
            ABL_FILE="$(find "$TMP_ABL" -type f -name 'abl_b.img' | head -n 1)"
            test -n "$ABL_FILE"
            mv "$ABL_FILE" "$TOOLKIT/images/abl.img"
          fi
          cd "$TOOLKIT"
          chmod +x bin/extractfv bin/patch_abl bin/elf_inject bin/GenFw build.sh
          ./build.sh
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp ABL_with_superfastboot.efi "$GITHUB_WORKSPACE/artifacts/ABL_with_superfastboot.efi"
          cp ABL.efi "$GITHUB_WORKSPACE/artifacts/ABL_patched.efi"
          cp ABL_original.efi "$GITHUB_WORKSPACE/artifacts/ABL_original.efi"
          cp patch_log.txt "$GITHUB_WORKSPACE/artifacts/patch_log.txt"
          sha256sum "$GITHUB_WORKSPACE"/artifacts/* > "$GITHUB_WORKSPACE/artifacts/SHA256SUMS.txt"

      - name: Upload patched EFI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.ARTIFACT_NAME }}
          path: artifacts/*
