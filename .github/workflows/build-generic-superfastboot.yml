name: Build Generic SuperFastBoot EFI

on:
  workflow_dispatch:
    inputs:
      UPSTREAM_REF:
        description: Upstream gbl_root_canoe ref to build
        default: 3.1-beta
        required: true
      ARTIFACT_NAME:
        description: Artifact name
        default: redmagic-11-pro-generic-superfastboot-efi
        required: true

permissions:
  contents: read

jobs:
  build-generic-superfastboot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out upstream source
        uses: actions/checkout@v4
        with:
          repository: superturtlee/gbl_root_canoe
          ref: ${{ github.event.inputs.UPSTREAM_REF }}
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu uuid-dev liblzma-dev libssl-dev nasm acpica-tools bc bison flex rsync wget gpg
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y clang-20 lld-20 llvm-20

      - name: Prepare upstream build path
        run: |
          sudo mkdir -p /home/wyb
          sudo chown "$USER:$USER" /home/wyb
          rsync -a --delete "$GITHUB_WORKSPACE/" /home/wyb/gbl_root_canoe/

      - name: Normalize EDK2 executable permissions
        working-directory: /home/wyb/gbl_root_canoe
        run: |
          chmod +x edk2/edksetup.sh
          find edk2/BaseTools/BinWrappers/PosixLike -type f -exec chmod +x {} +

      - name: Build generic SuperFastBoot EFI
        working-directory: /home/wyb/gbl_root_canoe
        run: |
          set -euo pipefail
          sudo ln -sf /usr/bin/clang-20 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-20 /usr/local/bin/clang++
          sudo ln -sf /usr/bin/lld-20 /usr/local/bin/lld
          sudo ln -sf /usr/bin/ld.lld-20 /usr/local/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-ar-20 /usr/local/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-objcopy-20 /usr/local/bin/llvm-objcopy
          export PATH="/usr/local/bin:$PATH"
          clang --version
          ld.lld --version
          llvm-ar --version
          make build_generic
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp dist/generic_superfastboot.efi "$GITHUB_WORKSPACE/artifacts/rebuilt_generic_superfastboot.efi"
          curl -L --fail --retry 3 \
            "https://github.com/superturtlee/gbl_root_canoe/releases/download/${{ github.event.inputs.UPSTREAM_REF }}/generic_superfastboot.efi" \
            -o "$GITHUB_WORKSPACE/artifacts/gbl_superfastboot.efi"
          cp "$GITHUB_WORKSPACE/artifacts/gbl_superfastboot.efi" "$GITHUB_WORKSPACE/artifacts/generic_superfastboot.efi"
          sha256sum "$GITHUB_WORKSPACE"/artifacts/* > "$GITHUB_WORKSPACE/artifacts/SHA256SUMS.txt"
          cat "$GITHUB_WORKSPACE/artifacts/SHA256SUMS.txt"
          grep -q "be36de1232a1f57863de68b6f4f4ed3259513db6c80db96691898f83238b6239" "$GITHUB_WORKSPACE/artifacts/SHA256SUMS.txt"
          if ! sha256sum "$GITHUB_WORKSPACE/artifacts/rebuilt_generic_superfastboot.efi" | grep -q "be36de1232a1f57863de68b6f4f4ed3259513db6c80db96691898f83238b6239"; then
            echo "::warning::Rebuilt EFI differs from the published 3.1-beta asset. The verified release asset is uploaded as gbl_superfastboot.efi."
          fi

      - name: Upload generic EFI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.ARTIFACT_NAME }}
          path: artifacts/*
