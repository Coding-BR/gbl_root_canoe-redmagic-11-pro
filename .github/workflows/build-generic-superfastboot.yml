name: Build Generic SuperFastBoot EFI

on:
  workflow_dispatch:
    inputs:
      UPSTREAM_REF:
        description: Upstream gbl_root_canoe ref to build
        default: 3.1-beta
        required: true
      ARTIFACT_NAME:
        description: Artifact name
        default: redmagic-11-pro-generic-superfastboot-efi
        required: true

permissions:
  contents: read

jobs:
  build-generic-superfastboot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out upstream source
        uses: actions/checkout@v4
        with:
          repository: superturtlee/gbl_root_canoe
          ref: ${{ github.event.inputs.UPSTREAM_REF }}
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make ninja-build lld clang llvm gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu uuid-dev liblzma-dev libssl-dev nasm acpica-tools bc bison flex

      - name: Normalize EDK2 executable permissions
        run: |
          chmod +x submodules/uefi/edk2/edksetup.sh
          find submodules/uefi/edk2/BaseTools/BinWrappers/PosixLike -type f -exec chmod +x {} +

      - name: Build generic SuperFastBoot EFI
        run: |
          set -euo pipefail
          make target_generic_efi
          mkdir -p artifacts
          cp targets/generic_efi/build/generic_superfastboot.efi artifacts/generic_superfastboot.efi
          cp targets/generic_efi/build/generic_superfastboot.efi artifacts/gbl_superfastboot.efi
          sha256sum artifacts/* > artifacts/SHA256SUMS.txt
          cat artifacts/SHA256SUMS.txt
          grep -q "be36de1232a1f57863de68b6f4f4ed3259513db6c80db96691898f83238b6239" artifacts/SHA256SUMS.txt

      - name: Upload generic EFI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.ARTIFACT_NAME }}
          path: artifacts/*
